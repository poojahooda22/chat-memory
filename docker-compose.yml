services:
  db:
    # pinned: iterative_scan (multi-tenant recall) needs pgvector >= 0.8.0; the bare `pg16` tag is
    # rolling and a fresh pull could drop below it. 0.8.x is installed and verified.
    image: pgvector/pgvector:0.8-pg16
    container_name: chat-memory-db
    environment:
      POSTGRES_USER: chatmemory
      POSTGRES_PASSWORD: chatmemory
      POSTGRES_DB: chatmemory
    # host port 5434: 5432/5433 are taken by other local projects
    ports:
      - "5434:5432"
    volumes:
      - chat_memory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatmemory -d chatmemory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chat_memory_pgdata:
